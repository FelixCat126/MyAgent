appId: com.myagent.app
productName: MyAgent
directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*

mac:
  extendInfo:
    NSMicrophoneUsageDescription: MyAgent 需要使用麦克风，将语音转为输入框文字。
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: resources/icon.png

win:
  target:
    - nsis
    - zip
  icon: resources/icon.png

linux:
  target:
    - AppImage
    - deb
  category: Utility
  icon: resources/icon.png

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
